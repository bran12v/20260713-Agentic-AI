services:
  web:
    build:
      context:  ..
      dockerfile: docker/Dockerfile

    ports:
      - "5000:5000"
    
    environment:
      LOG_LEVEL: info
      LOG_JSON: "1"
      DB_PATH: /app/tickets.db
      DATA_DIR: /app/data

    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:5000/ready').raise_for_status()"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

    command: >
      sh -c "
        python -c 'from support_api.storage import init_db, seed_from_json; init_db(); seed_from_json()' && gunicorn --bind 0.0.0.0:5000 --workers 2 --access-logfile - --error-logfile - 'support_api.api:create_app()'
      "